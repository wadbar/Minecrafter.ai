name: CI/CD Pipeline - Minecrafter AI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Lint Rules & Code
      run: npm run lint
      
    - name: Build Application Matrix
      run: npm run build
      
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-artifacts
        path: dist/
        
  docker_publish:
    needs: build_and_test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}/minecrafter-ai:latest, ghcr.io/${{ github.repository }}/minecrafter-ai:${{ github.sha }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/minecrafter-ai:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/minecrafter-ai:buildcache,mode=max
